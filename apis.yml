name: PACCAR
description: >-
  PACCAR is a global technology leader in the design, manufacture, and customer
  support of premium light, medium, and heavy-duty trucks under the Kenworth,
  Peterbilt, and DAF nameplates. PACCAR also designs and manufactures advanced
  diesel engines, provides financial services and information technology, and
  distributes truck parts related to its principal business.
